<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato - Street Style</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- CABEÇALHO -->
    <div class="header">
        <div class="container">
            <div class="logo">
                <h1>STREET STYLE</h1>
                <p>Camisetas exclusivas</p>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="index.html#produtos">Produtos</a></li>
                    <li><a href="index.html#sobre">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </div>
            <div class="limpar"></div>
        </div>
    </div>

    <!-- CONTATO COM FORMULÁRIO -->
    <div class="pagina-contato">
        <div class="container">
            <h2 class="titulo">Fale Conosco</h2>
            
            <div class="formulario-area">
                <form action="#" method="post">
                    <div class="campo">
                        <label>Nome completo:</label>
                        <input type="text" name="nome" required>
                    </div>

                    <div class="campo">
                        <label>E-mail:</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="campo">
                        <label>Telefone:</label>
                        <input type="tel" name="telefone">
                    </div>

                    <div class="campo">
                        <label>Assunto:</label>
                        <select name="assunto" required>
                            <option value="">Selecione...</option>
                            <option>Dúvida sobre produto</option>
                            <option>Trocas e devoluções</option>
                            <option>Parceria</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label>Mensagem:</label>
                        <textarea rows="5" name="mensagem" required></textarea>
                    </div>

                    <div class="campo checkbox">
                        <label>
                            <input type="checkbox" name="newsletter">
                            Quero receber novidades
                        </label>
                    </div>

                    <button type="submit" class="botao-enviar">Enviar</button>
                </form>
            </div>

            <div class="info-contato">
                <div class="info-item">
                    <h3>📍 Endereço</h3>
                    <p>Rua Quinze de Novembro<br>Araçatuba - SP</p>
                </div>
                <div class="info-item">
                    <h3>📞 Telefone</h3>
                    <p>(18) 3456-7890</p>
                </div>
                <div class="info-item">
                    <h3>📧 E-mail</h3>
                    <p>contato@streetstyle.com.br</p>
                </div>
            </div>
            <div class="limpar"></div>
        </div>
    </div>

    <!-- RODAPÉ -->
    <div class="footer">
        <div class="container">
            <p>2026 Street Style - Todos os direitos reservados</p>
        </div>
    </div>

</body>
</html>
